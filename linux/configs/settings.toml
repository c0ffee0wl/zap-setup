# Generated by zap-setup. Re-running the installer will (with --force
# or explicit confirmation) overwrite this file.
#
# The api_key for any provider lives in the OS keyring, not in this file —
# paste it via Settings → AI → Agent Providers → LiteLLM (local) → API Key.

# Disable in-app auto-update check — the .deb install has no APT repo
# behind it (postinst skips that on purpose), so the toast can't actually
# update anything. Key verified in app/src/settings/autoupdate.rs.
[updates]
automatic_updates_enabled = false

# Denser overall UI — less inter-element whitespace, more rows on screen.
# Pin UI language to English so the locale doesn't follow the system
# (key + enum verified in app/src/settings/language.rs).
[appearance]
spacing  = "compact"
language = "english"

# Font — keys verified in app/src/settings/font.rs (Zap source).
[appearance.text]
font_name                             = "Fira Code"
font_size                             = 13.0
font_weight                           = "normal"
line_height_ratio                     = 1.2
notebook_font_size                    = 13.0
match_ai_font                         = true
ai_font_name                          = "Fira Code"
match_notebook_to_monospace_font_size = true

# Active theme = the custom YAML installed under
# ~/.local/share/zap/themes/. The loader pre-registers every YAML in
# that dir at startup, so this Custom reference resolves.
#
# Note the lowercase enum tag `custom` — ThemeKind serializes with
# `rename_all = "snake_case"` (app/src/themes/theme.rs). The `name` field
# MUST match the `name:` line in the YAML exactly; that's the join key.
# `selected_system_themes.light` is overridden to the same custom YAML so
# the "light" half of the system pair also picks up Terminator Black on
# White if `system_theme` is ever flipped on.
#
# The multi-line inline-table form below is technically TOML 1.1 (or
# spec-lenient toml-rs); 1.0 forbids newlines inside `{}`. We keep this
# form because it is exactly what Zap's own serializer writes — if
# we restructured to dotted-table form, Zap would rewrite it back on
# first save and our re-runs would show a spurious "overwrite?" diff.
[appearance.themes]
theme = {
  custom = {
    name = "Terminator Black on White",
    path = "__HOME__/.local/share/zap/themes/terminator_black_on_white.yaml",
  },
}
system_theme = false
selected_system_themes = {
  dark = "dark",
  light = {
    custom = {
      name = "Terminator Black on White",
      path = "__HOME__/.local/share/zap/themes/terminator_black_on_white.yaml",
    },
  },
}

# Cursor shape — block matches the Terminator default
# (terminator's `cursor_shape = block`).
[appearance.cursor]
cursor_display_type = "block"

# Padding around full-screen TUI apps (vim, htop, …) when they take over
# the alt screen — without this they sit flush against the window edge.
[appearance.full_screen_apps]
alt_screen_padding = { custom = { uniform_padding = 8.0 } }

# UI zoom (percentage). 125 = 125% — slightly larger than 1× without
# bumping the monospace font size.
[appearance.window]
zoom_level = 125

# Always show the workspace decoration in the tab bar (vs auto-hide).
[appearance.tabs]
workspace_decoration_visibility = "always_show"

# Vertical tabs ENABLED by default — `appearance.vertical_tabs.enabled`
# (the use_vertical_tabs key, app/src/workspace/tab_settings.rs:478) defaults to
# false, so we explicitly write it true. The remaining keys shape the vertical
# tab bar (also reachable via Settings → Appearance → Tabs).
# Keys + enum variants verified in app/src/workspace/tab_settings.rs:
#   display_granularity   → VerticalTabsDisplayGranularity {panes|tabs}
#   view_mode             → VerticalTabsViewMode {compact|expanded}
#   primary_info          → VerticalTabsPrimaryInfo {command|working_directory|branch}
#   compact_subtitle      → VerticalTabsCompactSubtitle {branch|working_directory|command}
#   show_details_on_hover → bool
# primary_info defaults to `command` and compact_subtitle to `branch`; we swap the
# two so the working directory is each tab's headline and the command is its
# subtitle. Both are real overrides, not no-ops.
# These enums serialize via the settings_value derive (convert_case Case::Snake);
# none of the chosen variants have digits/acronyms, so snake_case is unambiguous.
[appearance.vertical_tabs]
enabled               = true
display_granularity   = "tabs"
view_mode             = "compact"
primary_info          = "working_directory"
compact_subtitle      = "command"
show_details_on_hover = true

# Focus the pane the mouse is over, even without clicking. Mirrors
# Terminator's `focus = mouse` (set in /opt/linux-setup/linux-setup.sh).
[appearance.panes]
focus_pane_on_hover = true

# LiteLLM provider — proxy assumed to be listening on its default port 4000
# at localhost (LiteLLM setup is out of scope for this installer).
#
# Model `id` values use LiteLLM's `provider/model` routing form so the
# proxy dispatches to the right Azure deployment; `name` is the
# human-readable label shown in the provider picker.
#
# Written as a multi-line inline-table array (not a [[...]] array-of-tables)
# to match Zap's own serializer output — same rationale as the theme block
# above: it keeps re-runs from showing a spurious "overwrite?" diff after Zap
# rewrites the file on first save. Keys are alphabetized for the same reason.
#
# Per-model capability metadata (AgentProviderModel, app/src/settings/ai.rs:867):
# context_window / max_output_tokens are token budgets (0 = unknown);
# reasoning enables CoT; image/pdf/audio are tri-state force flags
# (present = override models.dev inference, absent = auto). tool_call
# defaults to true, so it's omitted.
[agents.warp_agent]
providers = [
  {
    api_type = "open_ai",
    base_url = "http://127.0.0.1:4000/v1/",
    id = "litellm-local",
    kind = "open_ai_compatible",
    models = [
      {
        audio = false,
        context_window = 400000,
        id = "azure/gpt-5.4-mini",
        image = true,
        max_output_tokens = 128000,
        name = "Azure GPT 5.4 mini",
        pdf = true,
        reasoning = true,
      },
    ],
    name = "LiteLLM (local)",
  },
]

# Disable proactive Active AI (the always-on assistant) — too intrusive
# for a Terminator-style terminal. Voice input also off.
[agents.warp_agent.active_ai]
enabled = false

# Don't auto-detect natural-language input in the terminal prompt — keep the
# terminal a terminal (plain text stays a command, never silently switches to
# an AI prompt).
#
# The reverse direction too: don't auto-detect when text typed into the agent
# (AI) input is actually a shell command and silently treat it as one — keep
# the agent input an AI prompt. This is the "Autodetect terminal commands in
# agent input" toggle; it defaults to true, so false is a real override. Key +
# default verified in app/src/settings/ai.rs:1161.
#
# Keep commands the AI agent runs OUT of normal command history (up-arrow,
# Ctrl-R search, inline history menu) — agent activity shouldn't pollute the
# hand-typed command history. This matches Zap's default (false); we set it
# explicitly to document the intent. Key + default verified in
# app/src/settings/ai.rs:1723.
[agents.warp_agent.input]
nld_in_terminal_enabled              = false
ai_auto_detection_enabled            = false
include_agent_commands_in_history    = false

[agents.voice]
voice_input_enabled = false

# Hide agent reasoning blocks entirely — keeps the transcript focused on
# the actual answer. Enum verified in app/src/settings/ai.rs:349 (variants
# show_and_collapse / always_show / never_show, snake_case).
[agents.warp_agent.other]
thinking_display_mode = "never_show"

[agents.third_party]

# Register Claude Code (and the `blaude` alias) with Zap's third-party CLI
# agent toolbar — when the running foreground command matches, Zap shows
# the dedicated Claude footer (rich input, plugin chip, etc.) instead of
# treating the process as an opaque TTY.
#
# Key is a regex; value is the agent label rendered in the toolbar.
# The map type accepts both `{ pattern = "Label" }` and a bare array of
# patterns.
# Single-quoted (TOML literal) so the `\s` escape is preserved verbatim
# and doesn't have to be doubled.
# Pattern breakdown:
#   (^|/)              — start of line OR after a path separator (so
#                        `/usr/local/bin/claude` and `claude` both match,
#                        but `myclaude` does not)
#   (claude|blaude)    — the binary name; `blaude` is the user's local
#                        alias / wrapper for claude
#   (\s|$)             — followed by whitespace (args) or end of line
[agents.third_party.cli_agent_toolbar_enabled_commands]
'(^|/)(claude|blaude)(\s|$)' = "Claude"

# Stretch toast duration to 8 s (default is shorter); useful for the
# longer agent / provider notifications.
[notifications]
toast_duration_secs = 8

# Don't restore the previous session at startup — fresh terminal every launch.
[general]
restore_session = false

# Don't display the empty-state block in a fresh terminal pane — go
# straight to a clean prompt.
[terminal]
show_terminal_zero_state_block = false

# Terminal input: hide the inline autosuggestion hint, use the classic
# (single-line) input box, and respect $PS1 from the user's shell rc
# instead of synthesising Zap's own prompt.
[terminal.input]
show_hint_text         = false
input_box_type_setting = "classic"
honor_ps1              = true
