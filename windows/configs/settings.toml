# Generated by zap-setup (Windows). Re-running the installer will (with --Force
# or explicit confirmation) overwrite this file.
#
# AI provider API keys are NOT stored here — on Windows Zap keeps them in a
# DPAPI-encrypted file under %LOCALAPPDATA%\zap\Zap\data\ (NOT the Credential
# Manager). The installer's Azure opt-in writes that file for you; otherwise
# paste a key via Settings -> AI -> Agent Providers.

# Disable in-app auto-update check — the installer manages updates by
# re-fetching ZapSetup.exe when GitHub has a newer release.
[updates]
automatic_updates_enabled = false

# Denser overall UI; pin UI language to English so it doesn't follow the
# system locale.
[appearance]
spacing  = "compact"
language = "english"

# Font: family intentionally UNSET so Zap uses its bundled default (Hack).
# Only size and line-height are pinned here.
[appearance.text]
font_size                             = 13.0
line_height_ratio                     = 1.2
notebook_font_size                    = 13.0
match_ai_font                         = true
match_notebook_to_monospace_font_size = true

# Built-in Dracula theme — Zap ships it (ThemeKind::Dracula), so no custom YAML
# and no themes dir are needed. The light half of the system pair is Solarized
# Light, used only if system_theme is ever flipped on. Values are the
# snake_case enum names Zap's serializer emits.
[appearance.themes]
theme = "dracula"
system_theme = false
selected_system_themes = { dark = "dracula", light = "solarized_light" }

# Cursor shape — block.
[appearance.cursor]
cursor_display_type = "block"

# Padding around full-screen TUI apps (vim, htop, …) when they take over the
# alt screen — without this they sit flush against the window edge.
[appearance.full_screen_apps]
alt_screen_padding = { custom = { uniform_padding = 8.0 } }

# UI zoom (percentage). 125 = 125% — slightly larger without bumping the
# monospace font size.
[appearance.window]
zoom_level = 125

# Always show the workspace decoration in the tab bar (vs auto-hide).
[appearance.tabs]
workspace_decoration_visibility = "always_show"

# Vertical tabs ENABLED by default — `appearance.vertical_tabs.enabled`
# (the use_vertical_tabs key, app/src/workspace/tab_settings.rs:478) defaults to
# false, so we explicitly write it true. The remaining keys shape the vertical
# tab bar (also reachable via Settings → Appearance → Tabs).
# Keys + enum variants verified in app/src/workspace/tab_settings.rs:
#   display_granularity   → VerticalTabsDisplayGranularity {panes|tabs}
#   view_mode             → VerticalTabsViewMode {compact|expanded}
#   compact_subtitle      → VerticalTabsCompactSubtitle {branch|working_directory|command}
#   show_details_on_hover → bool
# These enums serialize via the settings_value derive (convert_case Case::Snake);
# none of the chosen variants have digits/acronyms, so snake_case is unambiguous.
[appearance.vertical_tabs]
enabled               = true
display_granularity   = "tabs"
view_mode             = "compact"
compact_subtitle      = "working_directory"
show_details_on_hover = true

# Focus the pane the mouse is over, even without clicking.
[appearance.panes]
focus_pane_on_hover = true

# Open new sessions in Windows PowerShell 5.1 instead of Zap's default shell.
# NewSessionShell is an externally-tagged enum; the `executable` table key maps
# to its Executable(String) variant. Single-quoted TOML literal so the
# backslashes in the Windows path survive verbatim.
[session.new_session_shell_override]
executable = 'C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe'

# Disable proactive Active AI (the always-on assistant) — too intrusive for a
# Terminator-style terminal.
[agents.warp_agent.active_ai]
enabled = false

# Don't auto-detect natural-language input in the terminal prompt — keep the
# terminal a terminal (plain text stays a command, never silently switches to
# an AI prompt). This fork defaults the key to true, so false is a real
# override, not a no-op.
#
# The reverse direction too: don't auto-detect when text typed into the agent
# (AI) input is actually a shell command and silently treat it as one — keep
# the agent input an AI prompt. This is the "Autodetect terminal commands in
# agent input" toggle; it also defaults to true, so false is a real override.
# Key + default verified in app/src/settings/ai.rs:1161.
#
# Keep commands the AI agent runs OUT of normal command history (up-arrow,
# Ctrl-R search, inline history menu) — agent activity shouldn't pollute the
# hand-typed command history. This matches Zap's default (false); we set it
# explicitly to document the intent. Key + default verified in
# app/src/settings/ai.rs:1723.
[agents.warp_agent.input]
nld_in_terminal_enabled              = false
ai_auto_detection_enabled            = false
include_agent_commands_in_history    = false

[agents.voice]
voice_input_enabled = false

# Hide agent reasoning blocks entirely — keeps the transcript focused on the
# actual answer.
[agents.warp_agent.other]
thinking_display_mode = "never_show"

# NOTE: no AI provider is configured by default. The installer's Azure opt-in
# appends an `[agents.warp_agent]` section with a `providers = [...]` inline-
# table array here (and writes the API key to the DPAPI store). Decline the
# prompt and Zap starts with no provider — add one via Settings.

# Stretch toast duration to 8 s (default is shorter).
[notifications]
toast_duration_secs = 8

# Don't restore the previous session at startup — fresh terminal every launch.
[general]
restore_session = false

# Don't display the empty-state block in a fresh terminal pane — go straight to
# a clean prompt.
[terminal]
show_terminal_zero_state_block = false

# Terminal input: hide the inline autosuggestion hint, use the classic
# (single-line) input box, and use the shell's own prompt instead of
# synthesising Zap's.
[terminal.input]
show_hint_text         = false
input_box_type_setting = "classic"
honor_ps1              = true
